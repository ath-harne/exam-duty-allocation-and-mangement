services:
  # ─────────────────────────────────────────────
  # BACKEND — Node/Express Web Service
  # ─────────────────────────────────────────────
  - type: web
    name: exam-duty-backend
    runtime: node
    rootDir: .
    buildCommand: npm install --production=false
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically — do not hardcode it
      # Add these in the Render dashboard under Environment:
      #
      # DATABASE_URL   → your Railway/PlanetScale MySQL connection string
      #   OR
      # DB_HOST        → cloud MySQL host
      # DB_PORT        → 3306
      # DB_USER        → db username
      # DB_PASSWORD    → db password
      # DB_NAME        → exam_duty_management
      # DB_SSL         → true
      #
      # CLIENT_ORIGIN  → https://exam-duty-frontend.onrender.com

  # ─────────────────────────────────────────────
  # FRONTEND — Static Site (Vite build)
  # ─────────────────────────────────────────────
  - type: web
    name: exam-duty-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend service URL in the Render dashboard:
      # VITE_API_BASE_URL → https://exam-duty-backend.onrender.com/api
